services:
  - type: web
    name: skillgap-ai-backend
    env: python
    plan: free
    buildCommand: "pip install -r api/requirements.txt"
    startCommand: "bash api/start.sh"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DB_FILE
        value: /opt/render/project/src/cv.db
    healthCheckPath: /api/health
