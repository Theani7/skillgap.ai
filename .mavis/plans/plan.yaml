version: 1
plan:
  name: 'skillgap.ai bug finding and fixing'
  max_concurrency: 3
  max_consecutive_failures: 2
  max_cycles: 10
  auto_reject_retries: 2
  verifier_config:
    default_verifiers: [verifier]
    audit_sample_rate: 0.0
tasks:
  - id: backend-bug-hunt
    title: 'Find and fix backend bugs'
    prompt: >
      You are debugging the SkillGap.ai backend at /Users/theani7x/Downloads/skillgap.ai.
      
      Your job: read through the backend code in the `api/` directory, identify bugs (logic errors, security issues, edge cases, missing error handling, incorrect assumptions, etc.), and fix them.
      
      Key files to read first:
      - api/main.py (main FastAPI app, ~1300 lines)
      - api/auth.py (JWT & password utils)
      - api/security.py (password hashing)
      - api/database.py (SQLite setup)
      - api/extractor.py (resume parsing)
      - api/career_services.py (scoring/matching)
      - api/job_hunt_services.py (job matching)
      - api/schemas.py (Pydantic models)
      - api/models.py (DB models)
      - api/config.py (config)
      
      Read ALL backend files thoroughly. For each bug you find:
      1. Explain the bug in plain English
      2. Show the fix
      3. Apply the fix to the actual file
      
      Common categories to look for:
      - SQL injection vulnerabilities
      - Missing auth checks on protected routes
      - JWT token validation issues
      - Error handling gaps
      - Race conditions
      - Input validation issues
      - File upload security (magic byte bypasses, path traversal)
      - CORS misconfigurations
      - Rate limiting bypasses
      - Logic errors in business logic
      - Missing null checks
      - Inconsistent error responses
      - Hardcoded secrets or keys
      - Missing or incorrect Pydantic validations
      - Database transaction issues
      - Token rotation bugs
      
      After reading and fixing, write a summary of all bugs found and fixed to a file:
      /Users/theani7x/Downloads/skillgap.ai/backend-bugs-found.md
      
      Include for each bug: file, line number, description, fix applied.
    assigned_to: general
    verified_by: verifier
    verify_prompt: >
      Re-read the backend files you investigated. For each claimed fix, verify:
      1. The bug description is accurate (re-read the original code context)
      2. The fix actually addresses the root cause, not just the symptom
      3. The fix doesn't introduce new bugs or regressions
      4. The fix follows existing patterns in the codebase
      
      Also do a fresh pass looking for any bugs the general agent might have missed:
      - Check auth.py for token validation edge cases
      - Check main.py for missing dependency injection or unprotected routes
      - Check extractor.py for error handling in PDF/DOCX parsing
      - Check career_services.py and job_hunt_services.py for logic errors
      - Check schemas.py for missing validations
      
      Write your verification findings to:
      /Users/theani7x/Downloads/skillgap.ai/backend-verification.md
      
      If you find new bugs the general agent missed, list them with file, line, and description.
    timeout_ms: 1800000

  - id: frontend-bug-hunt
    title: 'Find and fix frontend bugs'
    prompt: >
      You are debugging the SkillGap.ai frontend at /Users/theani7x/Downloads/skillgap.ai.
      
      Your job: read through the frontend code in the `frontend/src/` directory, identify bugs (logic errors, security issues, missing error handling, incorrect assumptions, state management issues, etc.), and fix them.
      
      Key files to read first:
      - frontend/src/App.jsx (root component, routing)
      - frontend/src/main.jsx (entry point)
      - frontend/src/context/AuthContext.jsx (auth state management)
      - frontend/src/pages/Login.jsx
      - frontend/src/pages/Register.jsx
      - frontend/src/pages/Analyzer.jsx (main resume analysis page)
      - frontend/src/pages/Profile.jsx (user dashboard)
      - frontend/src/pages/Admin.jsx (admin panel)
      - frontend/src/pages/Landing.jsx
      - frontend/src/components/Sidebar.jsx
      - frontend/src/components/ErrorBoundary.jsx
      
      Read ALL frontend files thoroughly. For each bug you find:
      1. Explain the bug in plain English
      2. Show the fix
      3. Apply the fix to the actual file
      
      Common categories to look for:
      - Missing auth guards (routes accessible without login)
      - XSS vulnerabilities
      - Improper error handling for API failures
      - State management bugs (stale state, race conditions)
      - Memory leaks (missing cleanup in useEffect)
      - Incorrect API endpoint URLs
      - Missing loading/error states
      - Form validation issues
      - Token/cookie handling bugs
      - Redirect issues
      - Component rendering errors
      - Missing null/undefined checks
      - Improper use of async/await
      - Memory-intensive operations (large data in state)
      - Accessibility issues
      
      After reading and fixing, write a summary of all bugs found and fixed to a file:
      /Users/theani7x/Downloads/skillgap.ai/frontend-bugs-found.md
      
      Include for each bug: file, line number (if applicable), description, fix applied.
    assigned_to: general
    verified_by: verifier
    verify_prompt: >
      Re-read the frontend files you investigated. For each claimed fix, verify:
      1. The bug description is accurate (re-read the original code context)
      2. The fix actually addresses the root cause, not just the symptom
      3. The fix doesn't introduce new bugs or regressions
      4. The fix follows existing React patterns in the codebase
      
      Also do a fresh pass looking for any bugs the general agent might have missed:
      - Check AuthContext.jsx for token/cookie handling edge cases
      - Check App.jsx for missing route guards
      - Check Analyzer.jsx for error handling in file upload and API calls
      - Check for XSS vulnerabilities in any dangerouslySetInnerHTML usage
      - Check for missing cleanup in useEffect hooks
      
      Write your verification findings to:
      /Users/theani7x/Downloads/skillgap.ai/frontend-verification.md
      
      If you find new bugs the general agent missed, list them with file, line (if applicable), and description.
    timeout_ms: 1800000
