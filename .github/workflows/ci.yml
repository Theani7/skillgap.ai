name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: api/requirements.txt

      - run: pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
        env:
          PYTHONPATH: ${{ github.workspace }}
          GEMINI_API_KEY: test-key
          JWT_SECRET_KEY: ci-test-secret-key-at-least-32-chars
          DB_FILE: ":memory:"
          ENV: development

  docker:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t skillgap-backend .

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t skillgap-frontend .

      - name: Smoke test backend container
        run: |
          docker run -d --name backend-test \
            -e GEMINI_API_KEY=test-key \
            -e JWT_SECRET_KEY=ci-test-secret-key-at-least-32-chars \
            -e DB_FILE=":memory:" \
            -e ENV=development \
            -e CORS_ORIGINS=http://localhost:5173 \
            -p 8000:8000 \
            skillgap-backend
          sleep 8
          docker logs backend-test
          curl -sf http://localhost:8000/api/health || exit 1
          docker stop backend-test
